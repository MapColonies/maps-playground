{{- $chartName := include "developer-portal.name" . -}}
{{- if .Values.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ $chartName }}-configmap
data:
  # NODE_TLS_REJECT_UNAUTHORIZED: '0'
  AWS_ENDPOINT_URL: {{ .Values.s3.url }}
  AWS_BUCKET: {{ .Values.s3.bucket }}
  AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey }}
  AWS_REGION: us-east-1
  INDEX_KEY: index.json
  ITEMS_TIMEOUT: '600'
  ITEMS_STALE: '600'
  PUBLIC_CATALOG_HREF: 'http://catalog'
  PUBLIC_DEVPORTAL_HREF: 'http://developer-portal'
  PUBLIC_PUZZLE_HREF: ''
  npm_config_cache: /tmp/
  # default.conf: {{ tpl (.Files.Get "config/default.conf") . | quote }}
{{- end }}
